[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "network: marks tests that require network access (deselect with '-m \"not network\"')",
]

[tool.ruff]
line-length = 100
exclude = ["tests/", ".venv/"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | venv
  | build
  | dist
)/
'''

[tool.coverage.run]
source = ["scanner/src"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
