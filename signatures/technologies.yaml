      html:
        - type: title
          pattern: "(?i)TeamCity"
          confidence: 0.95
    paths:
      - path: /login.html
        patterns: ["TeamCity"]
        confidence: 0.80

  - id: gocd
    name: GoCD
    category: CI/CD
    live_probe_required: true
