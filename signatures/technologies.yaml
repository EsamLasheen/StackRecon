# StackRecon Technology Signatures
# Format: id, name, category, live_probe_required, min_confidence_threshold, signals
# Signals: headers[], html[], paths[]

technologies:

  # ── Monitoring / Analytics ──────────────────────────────────────────────
  - id: grafana
    name: Grafana
    category: Monitoring/Analytics
    live_probe_required: true
    min_confidence_threshold: 0.60
    signals:
      headers:
        - name: Server
          pattern: "(?i)grafana"
          confidence: 0.95
      html:
        - type: title
          pattern: "(?i)^Grafana"
          confidence: 0.95
        - type: meta
          name: application-name
          pattern: "(?i)Grafana"
          confidence: 0.90
        - type: body
          pattern: "/public/app/"
          confidence: 0.75
    paths:
      - path: /api/health
        patterns: ["version"]
        confidence: 0.80

  - id: prometheus
    name: Prometheus
    category: Monitoring/Analytics
    live_probe_required: true
    min_confidence_threshold: 0.65
    signals:
      html:
        - type: title
          pattern: "(?i)^Prometheus"
          confidence: 0.95
    paths:
      - path: /metrics
        patterns: ["# TYPE", "# HELP"]
        confidence: 0.95
      - path: /api/v1/query
        status_codes: [200, 400]
        confidence: 0.80

  - id: kibana
    name: Kibana
    category: Visualization/Analytics
    live_probe_required: true
    min_confidence_threshold: 0.60
    signals:
      headers:
        - name: X-Elastic-Product
          pattern: "(?i)Kibana"
          confidence: 0.98
      html:
        - type: title
          pattern: "(?i)Kibana"
          confidence: 0.95
        - type: meta
          name: generator
          pattern: "(?i)Kibana"
          confidence: 0.90
    paths:
      - path: /api/status
        patterns: ["version"]
        confidence: 0.85

  # ── CI/CD ────────────────────────────────────────────────────────────────
  - id: jenkins
    name: Jenkins
    category: CI/CD
    live_probe_required: true
    min_confidence_threshold: 0.60
    signals:
      headers:
        - name: X-Jenkins
          pattern: ".*"
          confidence: 0.99
        - name: Server
          pattern: "(?i)jenkins"
          confidence: 0.95
      html:
        - type: title
          pattern: "(?i)Jenkins"
          confidence: 0.95
        - type: body
          pattern: "<h1[^>]*>Jenkins"
          confidence: 0.95
    paths:
      - path: /login
        patterns: ["jenkins", "credentials"]
        confidence: 0.85
      - path: /api/json
        status_codes: [200, 401]
        confidence: 0.80
    version_patterns:
      - header: X-Jenkins
        regex: "([\\d.]+)"

  - id: teamcity
    name: TeamCity
    category: CI/CD
    live_probe_required: true
    min_confidence_threshold: 0.65
    signals:
