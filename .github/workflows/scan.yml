name: Weekly Scan

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max programs to scan (leave empty for all ~800)"
        required: false
        default: ""

jobs:
  scan:
    name: Run StackRecon Scanner
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scanner/requirements.txt

      - name: Install httpx binary
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download nuclei templates
        run: |
          mkdir -p $HOME/nuclei-templates

          # 1) Official ProjectDiscovery templates as the base
          git clone --depth=1 https://github.com/projectdiscovery/nuclei-templates \
            $HOME/nuclei-templates/projectdiscovery

          # 2) emadshanab community collection — clone all 200+ repos in parallel
          #    (20 at a time, 30s timeout per repo so broken/private repos don't block)
          git clone --depth=1 https://github.com/emadshanab/Nuclei-Templates-Collection \
            /tmp/nuclei-collection

          grep -E '^https://github\.com/' /tmp/nuclei-collection/README.txt \
            | sort -u \
            | xargs -P 20 -I {} bash -c '
                name=$(echo "{}" | sed "s|https://github.com/||" | tr "/" "__" | tr -cd "a-zA-Z0-9_-")
                timeout 30 git clone --depth=1 --quiet "{}" \
                  "$HOME/nuclei-templates/$name" 2>/dev/null || true
              '

          echo "Templates ready: $(find $HOME/nuclei-templates -name '*.yaml' | wc -l) templates"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Mark scan started
        run: |
          python3 -c "
          import json, datetime, os
          now = datetime.datetime.utcnow().isoformat() + 'Z'
          os.makedirs('docs/data', exist_ok=True)
          progress = {
            'status': 'scanning',
            'phase': 'starting',
            'phase_label': 'Scan initializing...',
            'phase_number': 0,
            'total_phases': 4,
            'started_at': now,
            'updated_at': now,
            'programs_loaded': 0,
            'hostnames_total': 0,
            'detections_so_far': 0,
            'vuln_findings': 0,
          }
          with open('docs/data/progress.json', 'w') as f:
              json.dump(progress, f, indent=2)
          "
          git add docs/data/progress.json
          git diff --cached --quiet || git commit -m "scan: started [skip ci]"
          git push

      - name: Run scanner
        run: |
          # Background process: push progress.json every 5 minutes during scan.
          # Pull BEFORE add/commit so we never push to a diverged branch.
          (while true; do
            sleep 300
            if [ -f docs/data/progress.json ]; then
              git pull --rebase origin main || true
              git add docs/data/progress.json
              git diff --cached --quiet || {
                git commit -m "scan: progress update [skip ci]"
                git push || true
              }
            fi
          done) &
          PUSHER_PID=$!

          LIMIT="${{ github.event.inputs.limit }}"
          LIMIT_ARGS=""
          if [ -n "$LIMIT" ]; then
            # Validate: must be a plain integer to prevent shell injection
            if echo "$LIMIT" | grep -qE '^[0-9]+$'; then
              LIMIT_ARGS="--limit $LIMIT"
            else
              echo "[WARN] Ignoring non-numeric limit value: $LIMIT"
            fi
          fi

          python3 -m scanner.main \
            $LIMIT_ARGS \
            --workers 300 \
            --connect-timeout 1 \
            --read-timeout 3 \
            --output docs/data/data.json \
            --templates $HOME/nuclei-templates \
            --progress docs/data/progress.json

          kill $PUSHER_PID 2>/dev/null || true

      - name: Upload full report (private — only repo owner can download)
        uses: actions/upload-artifact@v4
        with:
          name: stackrecon-full-report-${{ github.run_id }}
          path: docs/data/data-full.json
          retention-days: 90
          if-no-files-found: warn

      - name: Commit results
        run: |
          git add -f docs/data/data.json docs/data/progress.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: weekly scan results [$(date -u '+%Y-%m-%d')]"
          # Rebase onto any progress commits the background pusher made.
          # -X theirs: on conflict prefer our scan data (the replayed commit).
          # GIT_EDITOR=true: prevents git from opening an interactive editor
          # in CI if it ever needs one (would hang the runner otherwise).
          GIT_EDITOR=true git pull --rebase -X theirs origin main
          git push
