name: Weekly Scan

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max programs to scan (leave empty for all ~800)"
        required: false
        default: ""

jobs:
  scan:
    name: Run StackRecon Scanner
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python3 -m scanner.main \
              --limit ${{ github.event.inputs.limit }} \
              --workers 50 \
              --output docs/data/data.json
          else
            python3 -m scanner.main \
              --workers 50 \
              --output docs/data/data.json
          fi

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: update scan results [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push
