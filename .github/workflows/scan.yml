name: Daily Scan

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max programs to scan (leave empty for all ~800)"
        required: false
        default: ""

jobs:
  scan:
    name: Run StackRecon Scanner
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scanner/requirements.txt

      - name: Install httpx binary
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates -ut 2>/dev/null || true

      - name: Run scanner
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python3 -m scanner.main \
              --limit ${{ github.event.inputs.limit }} \
              --workers 300 \
              --connect-timeout 1 \
              --read-timeout 3 \
              --output docs/data/data.json
          else
            python3 -m scanner.main \
              --workers 300 \
              --connect-timeout 1 \
              --read-timeout 3 \
              --output docs/data/data.json
          fi

      - name: Upload full report (private — only repo owner can download)
        uses: actions/upload-artifact@v4
        with:
          name: stackrecon-full-report-${{ github.run_id }}
          path: docs/data/data-full.json
          retention-days: 90

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: update scan results [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main || {
            echo "Rebase conflict — taking our scan results"
            git checkout --theirs docs/data/data.json
            git add docs/data/data.json
            git rebase --continue
          }
          git push
