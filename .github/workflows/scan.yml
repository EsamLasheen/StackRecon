name: Weekly Scan

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max programs to scan (leave empty for all ~800)"
        required: false
        default: ""

jobs:
  scan:
    name: Run StackRecon Scanner
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scanner/requirements.txt

      - name: Install httpx binary
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Clone custom nuclei templates
        run: |
          git clone --depth=1 https://github.com/emadshanab/Nuclei-Templates-Collection /tmp/nuclei-templates
          echo "Templates cloned: $(find /tmp/nuclei-templates -name '*.yaml' | wc -l) templates"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Mark scan started
        run: |
          python3 -c "
          import json, datetime, os
          now = datetime.datetime.utcnow().isoformat() + 'Z'
          os.makedirs('docs/data', exist_ok=True)
          progress = {
            'status': 'scanning',
            'phase': 'starting',
            'phase_label': 'Scan initializing...',
            'phase_number': 0,
            'total_phases': 4,
            'started_at': now,
            'updated_at': now,
            'programs_loaded': 0,
            'hostnames_total': 0,
            'detections_so_far': 0,
            'vuln_findings': 0,
          }
          with open('docs/data/progress.json', 'w') as f:
              json.dump(progress, f, indent=2)
          "
          git add docs/data/progress.json
          git diff --cached --quiet || git commit -m "scan: started [skip ci]"
          git push

      - name: Run scanner
        run: |
          # Background process: push progress.json every 5 minutes during scan
          (while true; do
            sleep 300
            if [ -f docs/data/progress.json ]; then
              git add docs/data/progress.json
              git diff --cached --quiet || {
                git commit -m "scan: progress update [skip ci]"
                git pull --rebase origin main || true
                git push || true
              }
            fi
          done) &
          PUSHER_PID=$!

          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python3 -m scanner.main \
              --limit ${{ github.event.inputs.limit }} \
              --workers 300 \
              --connect-timeout 1 \
              --read-timeout 3 \
              --output docs/data/data.json \
              --templates /tmp/nuclei-templates \
              --progress docs/data/progress.json
          else
            python3 -m scanner.main \
              --workers 300 \
              --connect-timeout 1 \
              --read-timeout 3 \
              --output docs/data/data.json \
              --templates /tmp/nuclei-templates \
              --progress docs/data/progress.json
          fi

          kill $PUSHER_PID 2>/dev/null || true

      - name: Upload full report (private — only repo owner can download)
        uses: actions/upload-artifact@v4
        with:
          name: stackrecon-full-report-${{ github.run_id }}
          path: docs/data/data-full.json
          retention-days: 90

      - name: Commit results
        run: |
          git add -f docs/data/data.json docs/data/progress.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: weekly scan results [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main || {
            echo "Rebase conflict — keeping our scan results"
            git checkout --theirs docs/data/data.json docs/data/progress.json
            git add docs/data/data.json docs/data/progress.json
            git rebase --continue
          }
          git push
